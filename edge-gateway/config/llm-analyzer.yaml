# llm-analyzer Configuration — Local LLM Fault Report Generation
# Matches edge-gateway/CONTEXT.md Decisions 1-8

model:
  path: "models/qwen2.5-1.5b-instruct-q4_k_m.gguf"
  context_length: 2048
  max_tokens: 512
  temperature: 0.7
  top_p: 0.9
  n_threads: 4                # CPU threads for llama.cpp inference

db:
  host: "timescaledb"
  port: 5432
  user: "edgevib"
  password: "edgevib123"
  dbname: "edgevib_ts"
  sslmode: "disable"

mqtt:
  broker: "mosquitto"
  port: 1883
  client_id: "edgevib-llm-analyzer"
  qos: 1
  subscribe_topic: "EdgeVib/+/inference/+/ai/report"
  publish_topic: "EdgeVib/{site_id}/llm/{device_id}/report"

dedup:
  window_seconds: 300           # 5-minute dedup window
  escalation_penetrate: true    # Severity change bypasses dedup

schedule:
  daily_summary_interval_h: 8   # Hours between daily summary reports (0 = disabled)
  health_report_interval_s: 30

prompts_dir: "prompts"
site_id: "factory1"
