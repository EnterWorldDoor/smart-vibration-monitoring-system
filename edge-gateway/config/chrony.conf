# EdgeVib P3: chrony NTP Server Configuration
# Orange Pi 4 Pro - LAN NTP time authority
#
# Role: NTP client (upstream PC) + NTP server (downstream ESP32/PC)
# Deploy: /etc/chrony/chrony.conf
# Service: systemctl enable --now chrony

# === NTP Upstream (client role) ===

# Primary upstream: PC direct Ethernet link (192.168.1.100)
# PC runs Windows w32time NTP Server, synced from internet NTP
server 192.168.1.100 iburst

# === Access Control (server role) ===

# Only serve LAN clients, reject public internet
allow 192.168.1.0/24
allow 192.168.2.0/24

# === Local Clock Fallback ===

# Serve LAN clients even when PC upstream is unreachable
# stratum 10 = low priority (auto-promoted when upstream available)
local stratum 10

# === Tolerance ===

# Windows w32time NTP has inherently high root dispersion (5-10s).
# Increase maxdistance to tolerate this — otherwise chrony marks it as unusable.
# Default: 1.0s. New value: 15.0s covers w32time's worst-case dispersion.
maxdistance 15.0

# === Time Adjustment ===

# Step clock on first sync if offset > 1 second (within 3 updates)
makestep 1.0 3

# === Persistence ===

# Drift file: saves crystal frequency offset (PPM) for free-run accuracy
driftfile /var/lib/chrony/drift

# === Logging ===

logdir /var/log/chrony
log measurements statistics tracking
