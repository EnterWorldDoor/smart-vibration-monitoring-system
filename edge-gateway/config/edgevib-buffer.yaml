# EdgeVib RAM Buffer Block Device — edgevib-flush-d service config
# MQTT → /dev/edgevib-buffer (ring) → TimescaleDB batch INSERT

buffer:
  device_path: "/dev/edgevib-buffer"
  sector_size: 4096
  total_sectors: 256                    # 1MB default

mqtt:
  broker: "localhost"
  port: 1883
  client_id: "edgevib-flush-d"
  subscribe_topic: "EdgeVib/+/+/+/data/#"
  qos: 1

timescaledb:
  host: "localhost"
  port: 5432
  dbname: "edgevib_ts"
  user: "edgevib"
  password: "edgevib123"
  sslmode: "disable"
  batch_size: 100                       # rows per batch INSERT
  flush_interval_ms: 5000               # max flush interval

health:
  interval_s: 30
  topic: "EdgeVib/system/health/edgevib-flush-d"

logging:
  level: "info"                         # debug | info | warn | error
