# EdgeVib Prometheus Configuration
# Infrastructure monitoring: Orange Pi host + Docker containers
# Scrape interval: 30s (Decision 4, CONTEXT.md)

global:
  scrape_interval: 30s
  evaluation_interval: 30s

# Alertmanager — separate container on edgevib-net
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Alert rules file
rule_files:
  - '/etc/prometheus/prometheus.rules.yml'

# Scrape targets
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Orange Pi host metrics (CPU/memory/disk/network/temperature)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Docker container metrics (CPU/memory/IO/network per container)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
