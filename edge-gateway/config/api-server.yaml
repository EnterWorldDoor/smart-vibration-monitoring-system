server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 10s
  write_timeout: 30s

timescaledb:
  host: "timescaledb"
  port: 5432
  user: "edgevib"
  password: "${DB_PASSWORD:-edgevib123}"
  database: "edgevib_ts"
  pool_max_conns: 5

mqtt:
  broker: "tcp://mosquitto:1883"
  client_id: "api-server"
  topics:
    - "EdgeVib/+/inference/+/ai/report"
    - "EdgeVib/+/llm/+/report"
    - "EdgeVib/+/+/+/status/health"

auth:
  enabled: false
  api_key: ""

log:
  level: "info"
  format: "json"
