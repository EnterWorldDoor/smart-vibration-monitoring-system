services:
  # === MQTT Broker ===
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: edgevib-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"  # WebSocket (optional)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - edgevib-net

  # === TimescaleDB (时序数据库) ===
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: edgevib-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: edgevib
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edgevib123}
      POSTGRES_DB: edgevib_ts
    volumes:
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - edgevib-net

  # === Grafana (可视化) ===
  grafana:
    image: grafana/grafana:latest
    container_name: edgevib-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    restart: unless-stopped
    networks:
      - edgevib-net
    depends_on:
      - timescaledb
      - prometheus

  # === data-aggregator (Go) ===
  data-aggregator:
    build:
      context: ../services/data-aggregator
      dockerfile: Dockerfile
    container_name: edgevib-aggregator
    volumes:
      - ../config/aggregator.yaml:/app/config.yaml:ro
      - ../config/devices.yaml:/app/devices.yaml:ro
    restart: unless-stopped
    networks:
      - edgevib-net
    depends_on:
      - mosquitto
      - timescaledb

  # === inference-engine (Python ONNX Runtime) ===
  inference-engine:
    image: edgevib-inference-engine:latest
    container_name: edgevib-inference-engine
    volumes:
      - ../config/inference.yaml:/app/config.yaml:ro
      - model_data:/app/src/models
      - ../services/inference-engine/src:/app/src:rw
    restart: unless-stopped
    networks:
      - edgevib-net
    depends_on:
      - mosquitto
      - timescaledb

  # === llm-analyzer (Python llama.cpp) ===
  llm-analyzer:
    image: edgevib-llm-analyzer:latest
    container_name: edgevib-llm-analyzer
    volumes:
      - ../config/llm-analyzer.yaml:/app/config.yaml:ro
      - ../models:/app/models:ro
      - ../services/llm-analyzer/src:/app/src:rw
      - ../services/llm-analyzer/prompts:/app/prompts:ro
    restart: unless-stopped
    networks:
      - edgevib-net
    mem_limit: 2g
    depends_on:
      - mosquitto
      - timescaledb

  # === API Server (Go REST + WebSocket) ===
  api-server:
    build:
      context: ../services/api-server
      dockerfile: Dockerfile
    container_name: edgevib-api-server
    ports:
      - "8080:8080"
    volumes:
      - ../config/api-server.yaml:/app/config.yaml:ro
    restart: unless-stopped
    networks:
      - edgevib-net
    depends_on:
      - mosquitto
      - timescaledb

  # === OTA Server (Go firmware distribution) ===
  ota-server:
    build:
      context: ../services/ota-server
      dockerfile: Dockerfile
    container_name: edgevib-ota-server
    ports:
      - "8090:8090"
    volumes:
      - ../config/ota-server.yaml:/app/config.yaml:ro
      - firmware_data:/app/firmware
    restart: unless-stopped
    networks:
      - edgevib-net
    depends_on:
      - mosquitto
      - timescaledb

  # === Model Deploy Service (Go model distribution) ===
  model-deploy:
    build:
      context: ../services/model-deploy
      dockerfile: Dockerfile
    container_name: edgevib-model-deploy
    ports:
      - "8091:8091"
    volumes:
      - ../config/model-deploy.yaml:/app/config.yaml:ro
      - model_data:/app/models
      - firmware_data:/app/firmware
    restart: unless-stopped
    networks:
      - edgevib-net
    depends_on:
      - mosquitto
      - timescaledb

  # === System Monitoring: Prometheus + Node Exporter + cAdvisor (P2) ===
  prometheus:
    image: prom/prometheus:latest
    container_name: edgevib-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../config/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - edgevib-net
    mem_limit: 80m
    depends_on:
      - node-exporter
      - cadvisor

  node-exporter:
    image: prom/node-exporter:latest
    container_name: edgevib-node-exporter
    command:
      - '--path.rootfs=/host'
      - '--collector.thermal_zone'
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped
    networks:
      - edgevib-net
    mem_limit: 15m

  cadvisor:
    image: google/cadvisor:latest
    container_name: edgevib-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: unless-stopped
    networks:
      - edgevib-net
    mem_limit: 30m

  # === Alertmanager + Webhook Bridge (P2) ===
  alertmanager:
    image: prom/alertmanager:latest
    container_name: edgevib-alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/config.yml:/etc/alertmanager/config.yml:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped
    networks:
      - edgevib-net
    mem_limit: 20m

  alert-webhook:
    build:
      context: ../scripts
      dockerfile: Dockerfile.alert-webhook
    container_name: edgevib-alert-webhook
    ports:
      - "8092:8092"
    restart: unless-stopped
    networks:
      - edgevib-net
    depends_on:
      - mosquitto
    mem_limit: 25m

volumes:
  mosquitto_data:
  mosquitto_log:
  timescaledb_data:
  grafana_data:
  firmware_data:
  model_data:
  prometheus_data:
  alertmanager_data:

networks:
  edgevib-net:
    driver: bridge
