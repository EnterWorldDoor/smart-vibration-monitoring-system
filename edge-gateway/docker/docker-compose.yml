version: "3.8"

services:
  # === MQTT Broker ===
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: edgevib-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"  # WebSocket (optional)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - edgevib-net

  # === TimescaleDB (时序数据库) ===
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: edgevib-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: edgevib
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edgevib123}
      POSTGRES_DB: edgevib_ts
    volumes:
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - edgevib-net

  # === Grafana (可视化) ===
  grafana:
    image: grafana/grafana:latest
    container_name: edgevib-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    restart: unless-stopped
    networks:
      - edgevib-net
    depends_on:
      - timescaledb

  # === data-aggregator (Go) ===
  data-aggregator:
    build:
      context: ../services/data-aggregator
      dockerfile: Dockerfile
    container_name: edgevib-aggregator
    volumes:
      - ../config/aggregator.yaml:/app/config.yaml:ro
      - ../config/devices.yaml:/app/devices.yaml:ro
    restart: unless-stopped
    networks:
      - edgevib-net
    depends_on:
      - mosquitto
      - timescaledb

  # === inference-engine (Python ONNX Runtime) ===
  inference-engine:
    image: edgevib-inference-engine:latest
    container_name: edgevib-inference-engine
    volumes:
      - ../config/inference.yaml:/app/config.yaml:ro
      - ../services/inference-engine/src/models:/app/src/models:ro
      - ../services/inference-engine/src:/app/src:rw
    restart: unless-stopped
    networks:
      - edgevib-net
    depends_on:
      - mosquitto
      - timescaledb

volumes:
  mosquitto_data:
  mosquitto_log:
  timescaledb_data:
  grafana_data:

networks:
  edgevib-net:
    driver: bridge
