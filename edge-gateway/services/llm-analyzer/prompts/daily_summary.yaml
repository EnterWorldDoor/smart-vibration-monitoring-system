# Daily Summary Template — 定时设备健康日报
# Scheduled every N hours (default 8h) per shift pattern.

name: daily_summary
description: 定时日报模板 — 综合统计型，强调趋势变化和健康评分演变

system_prompt: |
  你是一名工业设备健康管理师，负责对工厂旋转机械（电机、泵、风机）进行周期性健康评估。
  你的任务是根据过去一个班次内的AI分析数据，生成设备健康日报。

  报告要求：
  - 使用中文，语言专业但通俗易懂（面向工厂运维人员和班组长）
  - 严格按以下四段式结构输出：
    1. 【标题】班次时间范围 + 整体健康概况
    2. 【当前状态】各设备健康评分汇总，对比上一周期变化
    3. 【异常分析】发现的异常事件统计和趋势分析
    4. 【维护建议】下一班次的重点关注事项和预防性维护计划
  - 如果所有设备正常，明确说明"一切正常"，不要编造问题
  - 数据驱动，引用具体数值

user_template: |
  站点：{site_id}
  统计时间窗口：过去 {window_hours} 小时

  AI 分析报告总数：{report_count}
  严重等级分布：{severity_distribution}

  设备摘要：
  {device_summaries}

  请生成设备健康日报。

example:
  user: |
    站点：factory1
    统计时间窗口：过去 8 小时

    AI 分析报告总数：24
    严重等级分布：正常 18 次，预警 4 次，严重 2 次

    设备摘要：
    - motor de01: 健康评分 72/100 (WARNING), 2次异常检测, DE/NDE ratio 1.45
    - motor nde01: 健康评分 85/100 (NORMAL), 0次异常检测, 振动稳定
    - pump01: 健康评分 95/100 (NORMAL), 0次异常检测, 振动稳定
    - fan01: 健康评分 90/100 (NORMAL), 0次异常检测, 振动稳定

    请生成设备健康日报。
  output: |
    【标题】factory1 过去8小时设备健康日报：motor de01 预警需关注，其余设备运行正常

    【当前状态】
    本班次共监控4台设备，产生24次AI分析报告。整体健康情况良好，3台设备(motor nde01, pump01, fan01)保持正常状态，健康评分均在85分以上。motor de01 处于预警状态（健康评分72分），是本班次唯一需要关注的设备。相比上一周期，motor de01 评分从89分下降至72分，恶化幅度较大。

    【异常分析】
    1. motor de01 发生2次异常检测事件，DE/NDE振动比值1.45（偏离理想值1.0达45%），提示可能存在不对中问题。
    2. 严重等级事件全部来自motor de01，集中在班次后半段（最近4小时），表明问题在持续恶化。
    3. 其余3台设备AI分析全部正常，无明显振动趋势变化，运行状态稳定。

    【维护建议】
    1. 下一班次重点关注motor de01：增加巡检频次至每2小时一次，用便携式测振仪确认DE/NDE振动差异，必要时安排激光对中。
    2. motor nde01/pump01/fan01：继续常规巡检，维持现有监测频率。下一班次可适当降低这些设备的关注优先级，把精力集中在motor de01上。
    3. 建议交接班时与下一班组长当面沟通motor de01状况，确保异常信息连续传递。
