# Alert Report Template — 事件触发的故障报告
# Triggers on inference-engine WARNING/CRITICAL events.

name: alert_report
description: 即时告警报告模板 — 事件驱动型，强调故障解读和处置建议

system_prompt: |
  你是一名工业设备振动分析专家，擅长旋转机械（电机、泵、风机）的故障诊断。
  你的任务是根据提供的传感器数据和 AI 分析结果，生成一份结构化的故障分析报告。

  报告要求：
  - 使用中文，语言专业但通俗易懂（面向工厂运维人员）
  - 严格按以下四段式结构输出：
    1. 【标题】一句话概括故障类型和严重程度
    2. 【当前状态】用通俗语言描述设备当前运行状况
    3. 【异常分析】基于数据深度分析异常原因和潜在故障模式
    4. 【维护建议】给出具体、可操作的检查和处理建议（至少3条）
  - 数据驱动，引用具体数值
  - 不确定的地方明确指出，不要编造

user_template: |
  设备信息：{device_info}
  告警等级：{severity}
  触发原因：{trigger_reason}

  健康评分：{health_score}/100
  异常分数：{anomaly_score}

  振动趋势数据（最近10分钟）：
  - 振动总量(RMS)：当前 {current_rms} mm/s，趋势斜率 {rms_slope} mm/s/点
  - 峰值频率：{peak_frequency_hz} Hz，漂移标准差 {freq_drift_std} Hz
  - 波峰因子趋势：{crest_factor_slope}/点

  振动上下文：
  {vibration_summary}

  AI 分析警告：
  {ai_warnings}

  请生成故障分析报告。

example:
  user: |
    设备信息：factory1 motor de01 (驱动端轴承，转速1490 RPM)
    告警等级：CRITICAL
    触发原因：bearing_fault (AI 分类置信度 0.92)

    健康评分：35/100
    异常分数：0.52 (阈值 0.34)

    振动趋势数据（最近10分钟）：
    - 振动总量(RMS)：当前 8.5 mm/s，趋势斜率 0.12 mm/s/点
    - 峰值频率：245 Hz，漂移标准差 8.3 Hz
    - 波峰因子趋势：0.035/点

    振动上下文：
    - X轴振动：6.2 mm/s（上升趋势）
    - Y轴振动：5.8 mm/s（上升趋势）
    - Z轴振动：4.1 mm/s（稳定）
    - 整体RMS：8.5 mm/s（超过ISO 10816 Zone D阈值7.1 mm/s）

    AI 分析警告：
    - RMS rising: 0.120 mm/s per point
    - Freq drift: σ=8.3 Hz
    - Crest factor rising: 0.0350/point
    - HF energy rising: 0.000150/point

    请生成故障分析报告。
  output: |
    【标题】motor de01 驱动端轴承早期故障恶化，振动已超ISO 10816 Zone D限值

    【当前状态】
    设备当前运行在危险区间，振动总量RMS达到8.5 mm/s，已超过ISO 10816标准的Zone D报警阈值(7.1 mm/s)。健康评分仅35分，属于严重级别。振动呈持续上升趋势，近10分钟内每2秒采样点增加约0.12 mm/s，恶化速度较快。峰值频率245 Hz落在轴承外圈故障特征频率附近，且频率稳定性下降（标准差8.3 Hz），表明故障正在发展中。

    【异常分析】
    1. 振动总量超标：当前8.5 mm/s远超7.1 mm/s阈值，且上升斜率0.12 mm/s/点为正常范围的2.4倍。按此趋势，5分钟后可能突破12 mm/s。
    2. 轴承故障特征：峰值频率245 Hz与外圈通过频率(BPFO)高度吻合。AI模型以92%置信度分类为bearing_fault，与频率特征分析结果一致。
    3. 早期缺陷信号：波峰因子持续上升(0.035/点)表明存在早期剥落或点蚀，冲击信号正在增强。高频段(200-400Hz)能量占比上升，符合轴承磨损的频谱迁移特征。
    4. 潜在原因：润滑不良、疲劳剥落或安装不对中导致轴承早期损伤，需进一步检查确认。

    【维护建议】
    1. 立即安排停机检查：当前振动水平不允许继续运行，建议2小时内安排停机，避免突发故障导致转子卡死或轴承碎裂等次生损坏。
    2. 重点检查驱动端轴承(DE端)：拆检轴承，检查内外圈滚道和滚动体是否有剥落、点蚀或变色。同时检查润滑脂状态，是否有金属颗粒或变黑。
    3. 检查联轴器对中：DE/NDE振动不对称可能暗示不对中问题，在更换轴承的同时使用激光对中仪校正联轴器。
    4. 更换轴承后执行磨合监测：新轴承安装后进行4小时低速磨合，全程监测振动趋势，确认RMS稳定在2.8 mm/s以下后再恢复全速运行。
    5. 事后分析：将拆下的轴承送检做失效分析，明确根本原因（疲劳/润滑/安装），录入设备维护档案。
