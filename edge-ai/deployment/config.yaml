# EdgeVib Deployment Configuration — ESP32-S3 部署目标
# 运行环境: Anaconda edgevib-tf (PC端执行转换/量化/头文件生成)

# ==================== TFLite 转换配置 ====================
tflite:
  primary_model_path: "models/saved_models/primary_best.h5"
  output_dir: "deployment/models"
  optimization: "dynamic"
  enable_int8_quantization: false
  representative_data_path: "datasets/X_train_sample.npy"

# ==================== ESP32 部署配置 ====================
esp32:
  c_header_output: "deployment/esp32_model_data.h"
  array_name: "edgevib_vibration_model"
  memory_alignment: 16
  target_latency_ms: 80
  target_ram_kb: 35

# ==================== 基准测试配置 ====================
benchmark:
  num_runs: 100
  warmup_runs: 10
  test_batch_size: 1
